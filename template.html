<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Usage Dashboard</title>
<style>
  :root {
    --bg: #f8f9fa; --card: #ffffff; --border: #e2e5e9; --text: #1a1a1a;
    --muted: #6b7280; --accent: #d97706; --warm: #059669; --cold: #dc2626;
    --cold-start: #9333ea; --header-bg: #f1f3f5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
  .summary-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
  .summary-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem; }
  .summary-card .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .summary-card .value { font-size: 1.35rem; font-weight: 600; margin-top: 0.15rem; }
  .summary-card .detail { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }
  .summary-card .value.warm { color: var(--warm); }
  .summary-card .value.cold { color: var(--cold); }
  .summary-card .value.cold-start { color: var(--cold-start); }
  table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; font-size: 0.8rem; margin-bottom: 1.5rem; }
  thead th { background: var(--header-bg); font-weight: 600; text-align: left; padding: 0.5rem 0.6rem; border-bottom: 2px solid var(--border); white-space: nowrap; font-size: 0.75rem; }
  thead th.group-warm { border-bottom-color: var(--warm); }
  thead th.group-cold-start { border-bottom-color: var(--cold-start); }
  thead th.group-cold { border-bottom-color: var(--cold); }
  thead th.group-total { border-bottom-color: var(--text); }
  tbody td { padding: 0.4rem 0.6rem; text-align: left; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  tbody td:first-child { font-weight: 500; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr.model-row td { font-weight: 600; cursor: pointer; user-select: none; }
  tbody tr.overhead-row td { cursor: pointer; user-select: none; }
  tbody tr.subtotal td { border-top: 2px solid var(--border); font-weight: 600; }
  .grand-total-bar { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 1rem; margin-top: 0.75rem; margin-bottom: 1.5rem; background: var(--header-bg); border: 1px solid var(--border); border-radius: 8px; font-weight: 700; font-size: 0.875rem; font-variant-numeric: tabular-nums; }
  tbody tr.detail-row.hidden { display: none; }
  tbody tr.detail-row td { font-size: 0.78rem; color: var(--muted); }
  tbody tr.detail-row td:first-child { padding-left: 1.75rem; }
  .toggle-arrow { display: inline-flex; align-items: center; justify-content: center; width: 1em; height: 1em; margin-right: 0.15em; vertical-align: middle; transition: transform 0.15s ease; color: #999; }
  .toggle-arrow .toggle-arrow-svg { width: 0.7em; height: 0.7em; }
  .toggle-arrow.collapsed { transform: rotate(0deg); }
  .toggle-arrow.expanded { transform: rotate(90deg); }
  .turn-count { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--text); }
  .col-sep { border-left: 2px solid var(--border); }
  .footnote { font-size: 0.7rem; color: var(--muted); margin-top: 0.5rem; line-height: 1.5; }
</style>
</head>
<body>
<h1>Claude Code Usage</h1>
<p class="subtitle" id="dateRange"></p>
<div class="summary-row" id="summaryRow1"></div>
<div class="summary-row" id="summaryRow2"></div>
<table id="directTable"><thead id="directHead"></thead><tbody id="directBody"></tbody></table>
<table id="overheadTable" style="margin-bottom:0"><thead id="overheadHead"></thead><tbody id="overheadBody"></tbody></table>
<div class="grand-total-bar"><span>Grand total</span><span id="grandTotalValue"></span></div>
<div class="footnote" id="footnotes"></div>
<script>
const DATA = __INJECTED_DATA__;

const fmt = (n) => n.toLocaleString('en-US');
const fmtCost = (n) => n === 0 ? '-' : '$' + n.toFixed(2);
const fmtTokens = (n) => { if (n === 0) return '-'; if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(0)+'K'; return fmt(n); };
const fmtTurns = (n) => n === 0 ? '-' : fmt(n);
const chevron = '<svg class="toggle-arrow-svg" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 1.5L7 5L3 8.5"/></svg>';

function modelName(key) {
  return key.split('|')[0].replace('claude-','').replace(/-/g,' ').replace(/(\d+) (\d+)/,'$1.$2').replace(/\b\w/g,c=>c.toUpperCase());
}
function getPrice(key) { return DATA.pricing[key.split('|')[0]] || null; }
function cost(tokens, rate) { return tokens / 1e6 * rate; }
function bucketInputCost(bd, p) { return p ? cost(bd.input,p.base)+cost(bd.cache_write,p.cache_write)+cost(bd.cache_read,p.cache_read) : 0; }
function sectionInputCost(sec, p) { return buckets.reduce((s,b) => s + bucketInputCost(sec[b],p), 0); }
function sectionOutputCost(sec, p) { return p ? cost(buckets.reduce((s,b) => s + sec[b].output, 0), p.output) : 0; }
function sectionTotalCost(sec, p) { return sectionInputCost(sec,p) + sectionOutputCost(sec,p); }

const buckets = ['cold_start', 'warm', 'cold_expired'];
const bucketLabels = { cold_start: 'Session start (cold)', warm: 'Warm turn', cold_expired: 'Cold turn' };
const bucketClasses = { cold_start: 'group-cold-start', warm: 'group-warm', cold_expired: 'group-cold' };

const directKeys = Object.keys(DATA.sections).filter(k => k.endsWith('|main'))
  .sort((a,b) => (DATA.pricing[b.split('|')[0]]?.base??0) - (DATA.pricing[a.split('|')[0]]?.base??0));

// ---- DIRECT TURNS TABLE ----
const dHead = document.getElementById('directHead');
let h1 = '<tr><th></th>';
for (const b of buckets) h1 += `<th class="${bucketClasses[b]}${b!==buckets[0]?' col-sep':''}" colspan="3">${bucketLabels[b]}</th>`;
h1 += '<th class="group-total col-sep">Total</th></tr>';
let h2 = '<tr><th></th>';
for (const b of buckets) h2 += `<th${b!==buckets[0]?' class="col-sep"':''}>Turns</th><th>Tokens</th><th>Cost</th>`;
h2 += '<th class="col-sep">Cost</th></tr>';
dHead.innerHTML = h1 + h2;

const dBody = document.getElementById('directBody');
let dt = {cold_start:0, warm:0, cold_expired:0, total:0}; // direct cost totals
let dTurns = {cold_start:0, warm:0, cold_expired:0, total:0};
let ridx = 0;

for (const key of directKeys) {
  const sec = DATA.sections[key], p = getPrice(key), name = modelName(key), rid = `d${ridx++}`;
  let rowTotal = 0;
  let html = `<td><span class="toggle-arrow collapsed" id="arrow-${rid}">${chevron}</span> ${name}</td>`;
  for (const b of buckets) {
    const turns = sec[b].human_turns, ic = bucketInputCost(sec[b], p);
    dt[b] += ic; dTurns[b] += turns; rowTotal += ic;
    html += `<td${b!==buckets[0]?' class="col-sep"':''}>${fmtTurns(turns)}</td><td></td><td>${fmtCost(ic)}</td>`;
  }
  dt.total += rowTotal; dTurns.total += buckets.reduce((s,b)=>s+sec[b].human_turns,0);
  html += `<td class="col-sep">${fmtCost(rowTotal)}</td>`;
  const tr = document.createElement('tr'); tr.className = 'model-row'; tr.innerHTML = html;
  tr.onclick = () => toggleSection(rid); dBody.appendChild(tr);

  // Detail rows
  for (const f of [{l:'Base input',k:'input',r:'base'},{l:'Cache writes (5m)',k:'cache_write',r:'cache_write'},{l:'Cache read',k:'cache_read',r:'cache_read'}]) {
    let dh = `<td>${f.l}</td>`;
    for (const b of buckets) { const t=sec[b][f.k], c=cost(t,p?p[f.r]:0); dh += `<td${b!==buckets[0]?' class="col-sep"':''}></td><td>${fmtTokens(t)}</td><td>${fmtCost(c)}</td>`; }
    dh += `<td class="col-sep">${fmtCost(buckets.reduce((s,b)=>s+cost(sec[b][f.k],p?p[f.r]:0),0))}</td>`;
    const dtr = document.createElement('tr'); dtr.className = `detail-row ${rid} hidden`; dtr.innerHTML = dh; dBody.appendChild(dtr);
  }
}

// Direct subtotal
{
  let html = '<td>Human turns</td>';
  for (const b of buckets) html += `<td${b!==buckets[0]?' class="col-sep"':''} class="turn-count">${dTurns[b]}</td><td></td><td>${fmtCost(dt[b])}</td>`;
  html += `<td class="col-sep">${fmtCost(dt.total)}</td>`;
  const tr = document.createElement('tr'); tr.className = 'subtotal'; tr.innerHTML = html; dBody.appendChild(tr);
}

// ---- LLM ACTIONS TABLE ----
const oHead = document.getElementById('overheadHead');
oHead.innerHTML =
  '<tr><th></th><th>Agent</th><th class="col-sep" colspan="4">Subagent</th><th class="col-sep"></th></tr>' +
  '<tr><th>LLM actions</th><th>Output</th><th class="col-sep">Base</th><th>Write</th><th>Read</th><th>Output</th><th class="col-sep">Total</th></tr>';
const oBody = document.getElementById('overheadBody');
let llmTotal = 0;
let llmCols = {agentOut:0, subBase:0, subWrite:0, subRead:0, subOut:0};
let oidx = 0;

const allModels = [...new Set(Object.keys(DATA.sections).map(k=>k.split('|')[0]))]
  .sort((a,b) => (DATA.pricing[b]?.base??0) - (DATA.pricing[a]?.base??0));

const aggCost = (sec, costKey, rateKey, p) =>
  sec ? buckets.reduce((s,b) => s + cost(sec[b][costKey], p?.[rateKey]??0), 0) : 0;

for (const model of allModels) {
  const mainSec = DATA.sections[`${model}|main`];
  const subSec = DATA.sections[`${model}|subagent`];
  const p = DATA.pricing[model];
  const oid = `o${oidx++}`;
  const name = modelName(model+'|x');

  const agentOut = aggCost(mainSec, 'output', 'output', p);
  const subBase = aggCost(subSec, 'input', 'base', p);
  const subWrite = aggCost(subSec, 'cache_write', 'cache_write', p);
  const subRead = aggCost(subSec, 'cache_read', 'cache_read', p);
  const subOut = aggCost(subSec, 'output', 'output', p);
  const rowTotal = agentOut + subBase + subWrite + subRead + subOut;

  llmTotal += rowTotal;
  llmCols.agentOut += agentOut; llmCols.subBase += subBase; llmCols.subWrite += subWrite;
  llmCols.subRead += subRead; llmCols.subOut += subOut;

  const subTurns = subSec ? buckets.reduce((s,b) => s + subSec[b].human_turns, 0) : 0;
  const tr = document.createElement('tr'); tr.className = 'model-row';
  tr.innerHTML = `<td><span class="toggle-arrow collapsed" id="arrow-${oid}">${chevron}</span> ${name}</td><td>${fmtCost(agentOut)}</td><td class="col-sep">${fmtCost(subBase)}</td><td>${fmtCost(subWrite)}</td><td>${fmtCost(subRead)}</td><td>${fmtCost(subOut)}</td><td class="col-sep">${fmtCost(rowTotal)}</td>`;
  if (subTurns > 0) tr.onclick = () => toggleSection(oid);
  oBody.appendChild(tr);

  if (subTurns > 0) {
    for (const b of buckets) {
      const turns = subSec[b].human_turns;
      const bBase = cost(subSec[b].input, p?.base??0);
      const bWrite = cost(subSec[b].cache_write, p?.cache_write??0);
      const bRead = cost(subSec[b].cache_read, p?.cache_read??0);
      const bOut = cost(subSec[b].output, p?.output??0);
      const dtr = document.createElement('tr'); dtr.className = `detail-row ${oid} hidden`;
      dtr.innerHTML = `<td>${bucketLabels[b]} (${turns} turns)</td><td></td><td class="col-sep">${fmtCost(bBase)}</td><td>${fmtCost(bWrite)}</td><td>${fmtCost(bRead)}</td><td>${fmtCost(bOut)}</td><td class="col-sep"></td>`;
      oBody.appendChild(dtr);
    }
  }
}

// LLM actions subtotal
{ const tr = document.createElement('tr'); tr.className = 'subtotal';
  tr.innerHTML = `<td>LLM actions</td><td>${fmtCost(llmCols.agentOut)}</td><td class="col-sep">${fmtCost(llmCols.subBase)}</td><td>${fmtCost(llmCols.subWrite)}</td><td>${fmtCost(llmCols.subRead)}</td><td>${fmtCost(llmCols.subOut)}</td><td class="col-sep">${fmtCost(llmTotal)}</td>`;
  oBody.appendChild(tr); }

// Grand total
const grandTotal = dt.total + llmTotal;
document.getElementById('grandTotalValue').textContent = '$' + grandTotal.toFixed(2);

// ---- TOGGLE ----
function toggleSection(sid) {
  const rows = document.querySelectorAll(`.detail-row.${sid}`);
  const arrow = document.getElementById(`arrow-${sid}`);
  const vis = !rows[0]?.classList.contains('hidden');
  rows.forEach(r => r.classList.toggle('hidden', vis));
  arrow.classList.toggle('expanded', !vis); arrow.classList.toggle('collapsed', vis);
}

// ---- SUMMARY CARDS ----
const meta = DATA.meta;
const directInputTotal = dt.cold_start + dt.warm + dt.cold_expired;
function addCard(row, label, value, detail, cls) {
  const d = document.createElement('div'); d.className = 'summary-card';
  d.innerHTML = `<div class="label">${label}</div><div class="value ${cls||''}">${value}</div><div class="detail">${detail}</div>`;
  document.getElementById(row).appendChild(d);
}

addCard('summaryRow1', 'Total spend', '$'+grandTotal.toFixed(2), `${fmt(dTurns.total)} direct turns`);
addCard('summaryRow1', 'Session starts', fmt(dTurns.cold_start), `${fmtCost(dt.cold_start)} (${(100*dt.cold_start/directInputTotal).toFixed(0)}% of direct input)`, 'cold-start');
addCard('summaryRow1', 'Warm turns', fmt(dTurns.warm), `${fmtCost(dt.warm)} (${(100*dt.warm/directInputTotal).toFixed(0)}% of direct input)`, 'warm');
addCard('summaryRow1', 'Cold turns', fmt(dTurns.cold_expired), `${fmtCost(dt.cold_expired)} (${(100*dt.cold_expired/directInputTotal).toFixed(0)}% of direct input)`, 'cold');

addCard('summaryRow2', 'Sessions', fmt(meta.totalSessions), `${meta.activeDays} active days`);
addCard('summaryRow2', 'Avg turns / session', (dTurns.total / meta.totalSessions).toFixed(1), '');
const totalCompactions = (meta.compactions?.auto ?? 0) + (meta.compactions?.manual ?? 0);
addCard('summaryRow2', 'Compactions', fmt(totalCompactions), `${meta.compactions?.auto ?? 0} auto, ${meta.compactions?.manual ?? 0} manual \u00b7 cost not logged`);
addCard('summaryRow2', 'LLM actions', '$'+llmTotal.toFixed(2), `${(100*llmTotal/grandTotal).toFixed(0)}% of total (output + subagents)`);

document.getElementById('dateRange').textContent = meta.dateRange.length ? `${meta.dateRange[0]} \u2013 ${meta.dateRange[1]} \u00b7 All projects` : 'All projects';

const models = [...new Set(Object.keys(DATA.sections).map(k=>k.split('|')[0]))];
const pNotes = models.map(m => { const p=DATA.pricing[m]; return p ? `${modelName(m+'|x')}: $${p.base} base, $${p.cache_write} write, $${p.cache_read} hit, $${p.output} output` : `${modelName(m+'|x')}: pricing unavailable`; }).join('. ');
document.getElementById('footnotes').innerHTML = `MTok = million tokens. ${pNotes}.<br>"Session start" = first turn in a session (always cold). "Warm" = cache hit &gt;90%. "Cold" = &gt;5m gap or partial miss.<br>LLM actions = output tokens + subagent API calls. ${fmt(meta.totalSessions)} sessions, ${fmt(meta.subagentSessions)} subagent spawns. Deduplicated by requestId.`;
</script></body></html>
